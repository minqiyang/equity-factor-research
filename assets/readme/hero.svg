<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Equity Factor Research</title>
  <desc id="hero-desc">A local-first deterministic equity-factor research system represented by a dithered, date-aligned factor panel flowing from signals to simulated weights and evidence.</desc>

  <defs>
    <pattern id="dots-blue" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#153A62"/>
      <rect width="3" height="3" fill="#3A9BFF"/>
      <rect x="4" y="4" width="2" height="2" fill="#3A9BFF"/>
    </pattern>
    <pattern id="dots-purple" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#30205B"/>
      <rect width="3" height="3" fill="#936BFF"/>
      <rect x="4" y="4" width="2" height="2" fill="#936BFF"/>
    </pattern>
    <pattern id="dots-green" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#0D4338"/>
      <rect width="3" height="3" fill="#31D5AE"/>
      <rect x="4" y="4" width="2" height="2" fill="#31D5AE"/>
    </pattern>
    <pattern id="dots-orange" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#572F12"/>
      <rect width="3" height="3" fill="#FF9838"/>
      <rect x="4" y="4" width="2" height="2" fill="#FF9838"/>
    </pattern>
    <pattern id="hatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#17191E"/>
      <rect width="3" height="10" fill="#936BFF"/>
    </pattern>
  </defs>

  <rect width="1200" height="460" rx="10" fill="#0A0B0D"/>
  <rect x="1" y="1" width="1198" height="458" rx="9" fill="none" stroke="#262930"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <g transform="translate(54 52)">
      <text x="0" y="0" dominant-baseline="hanging" font-size="14" letter-spacing="2" fill="#31D5AE">RESEARCH / 01</text>
      <text x="0" y="68" font-size="52" letter-spacing="-2.5" fill="#F4F4F5">equity-factor</text>
      <text x="0" y="126" font-size="52" letter-spacing="-2.5" fill="#F4F4F5">research</text>
      <text x="0" y="178" font-size="17" fill="#A9A9B0">local-first infrastructure for factor research,</text>
      <text x="0" y="204" font-size="17" fill="#A9A9B0">simulated accounting, and reproducible evidence</text>

      <g transform="translate(0 250)" font-size="12">
        <rect width="150" height="34" rx="4" fill="#13151A" stroke="#262930"/>
        <rect x="10" y="11" width="12" height="12" fill="url(#dots-blue)"/>
        <text x="32" y="22" fill="#F4F4F5">point-in-time</text>
        <rect x="162" width="130" height="34" rx="4" fill="#13151A" stroke="#262930"/>
        <rect x="172" y="11" width="12" height="12" fill="url(#dots-purple)"/>
        <text x="194" y="22" fill="#F4F4F5">explicit lag</text>
        <rect x="304" width="126" height="34" rx="4" fill="#13151A" stroke="#262930"/>
        <rect x="314" y="11" width="12" height="12" fill="url(#dots-green)"/>
        <text x="336" y="22" fill="#F4F4F5">audit trail</text>
      </g>

      <g transform="translate(0 326)" font-size="11" fill="#777982">
        <text x="0" y="0">DATA</text>
        <text x="88" y="0" fill="#D4D4D8">local CSV + fixtures</text>
        <text x="0" y="25">SCOPE</text>
        <text x="88" y="25" fill="#D4D4D8">simulated research</text>
        <text x="0" y="50">OUTPUT</text>
        <text x="88" y="50" fill="#D4D4D8">Markdown + JSON</text>
      </g>
    </g>

    <g transform="translate(644 48)">
      <text x="0" y="0" dominant-baseline="hanging" font-size="12" letter-spacing="1.6" fill="#777982">ALIGNED FACTOR PANEL</text>
      <text x="500" y="0" text-anchor="end" dominant-baseline="hanging" font-size="11" fill="#777982">DATE →</text>
      <path d="M0 31H500" stroke="#262930"/>

      <g transform="translate(0 52)">
        <g fill="#5A5C65" font-size="10">
          <text x="0" y="18">RANK 01</text>
          <text x="0" y="62">RANK 02</text>
          <text x="0" y="106">RANK 03</text>
          <text x="0" y="150">RANK 04</text>
          <text x="0" y="194">RANK 05</text>
        </g>

        <g transform="translate(80 0)">
          <rect x="0" y="0" width="54" height="28" fill="url(#dots-blue)"/>
          <rect x="60" y="0" width="54" height="28" fill="url(#dots-blue)"/>
          <rect x="120" y="0" width="54" height="28" fill="url(#dots-purple)"/>
          <rect x="180" y="0" width="54" height="28" fill="url(#dots-purple)"/>
          <rect x="240" y="0" width="54" height="28" fill="url(#dots-green)"/>
          <rect x="300" y="0" width="54" height="28" fill="url(#dots-green)"/>
          <rect x="360" y="0" width="54" height="28" fill="url(#dots-orange)"/>

          <rect x="0" y="44" width="54" height="28" fill="#13151A" stroke="#262930"/>
          <rect x="60" y="44" width="54" height="28" fill="url(#dots-green)"/>
          <rect x="120" y="44" width="54" height="28" fill="url(#dots-blue)"/>
          <rect x="180" y="44" width="54" height="28" fill="url(#dots-blue)"/>
          <rect x="240" y="44" width="54" height="28" fill="url(#dots-purple)"/>
          <rect x="300" y="44" width="54" height="28" fill="url(#dots-orange)"/>
          <rect x="360" y="44" width="54" height="28" fill="#13151A" stroke="#262930"/>

          <rect x="0" y="88" width="54" height="28" fill="url(#dots-purple)"/>
          <rect x="60" y="88" width="54" height="28" fill="#13151A" stroke="#262930"/>
          <rect x="120" y="88" width="54" height="28" fill="url(#dots-green)"/>
          <rect x="180" y="88" width="54" height="28" fill="url(#dots-orange)"/>
          <rect x="240" y="88" width="54" height="28" fill="url(#dots-blue)"/>
          <rect x="300" y="88" width="54" height="28" fill="url(#dots-purple)"/>
          <rect x="360" y="88" width="54" height="28" fill="url(#dots-green)"/>

          <rect x="0" y="132" width="54" height="28" fill="url(#dots-orange)"/>
          <rect x="60" y="132" width="54" height="28" fill="url(#dots-purple)"/>
          <rect x="120" y="132" width="54" height="28" fill="#13151A" stroke="#262930"/>
          <rect x="180" y="132" width="54" height="28" fill="url(#dots-green)"/>
          <rect x="240" y="132" width="54" height="28" fill="url(#dots-green)"/>
          <rect x="300" y="132" width="54" height="28" fill="url(#dots-blue)"/>
          <rect x="360" y="132" width="54" height="28" fill="url(#dots-purple)"/>

          <rect x="0" y="176" width="54" height="28" fill="#13151A" stroke="#262930"/>
          <rect x="60" y="176" width="54" height="28" fill="url(#dots-orange)"/>
          <rect x="120" y="176" width="54" height="28" fill="url(#dots-purple)"/>
          <rect x="180" y="176" width="54" height="28" fill="url(#dots-blue)"/>
          <rect x="240" y="176" width="54" height="28" fill="#13151A" stroke="#262930"/>
          <rect x="300" y="176" width="54" height="28" fill="url(#dots-green)"/>
          <rect x="360" y="176" width="54" height="28" fill="url(#dots-orange)"/>
        </g>
      </g>

      <g transform="translate(0 294)">
        <path d="M0 0H500" stroke="#262930"/>
        <text x="73" y="31" text-anchor="middle" font-size="12" fill="#F4F4F5">t-1 / signal</text>
        <text x="250" y="31" text-anchor="middle" font-size="12" fill="#F4F4F5">t / weights</text>
        <text x="427" y="31" text-anchor="middle" font-size="12" fill="#F4F4F5">t+1 / evidence</text>
        <rect x="0" y="43" width="146" height="17" rx="2" fill="url(#dots-blue)"/>
        <rect x="177" y="43" width="146" height="17" rx="2" fill="url(#hatch)"/>
        <rect x="354" y="43" width="146" height="17" rx="2" fill="url(#dots-green)"/>
        <path d="M150 51H171M167 47L171 51L167 55M327 51H348M344 47L348 51L344 55" fill="none" stroke="#777982"/>
      </g>
    </g>
  </g>
</svg>
