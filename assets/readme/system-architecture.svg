<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="architecture-title architecture-desc">
  <title id="architecture-title">System architecture</title>
  <desc id="architecture-desc">A four-layer architecture connecting local inputs, research transformations, simulated accounting, and evidence, with tests and CI as a control plane.</desc>
  <defs>
    <pattern id="sa-blue" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#153A62"/><rect width="3" height="3" fill="#3A9BFF"/><rect x="4" y="4" width="2" height="2" fill="#3A9BFF"/></pattern>
    <pattern id="sa-purple" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#30205B"/><rect width="3" height="3" fill="#936BFF"/><rect x="4" y="4" width="2" height="2" fill="#936BFF"/></pattern>
    <pattern id="sa-green" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#0D4338"/><rect width="3" height="3" fill="#31D5AE"/><rect x="4" y="4" width="2" height="2" fill="#31D5AE"/></pattern>
    <pattern id="sa-orange" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#572F12"/><rect width="3" height="3" fill="#FF9838"/><rect x="4" y="4" width="2" height="2" fill="#FF9838"/></pattern>
  </defs>
  <rect width="1200" height="540" rx="10" fill="#0A0B0D"/>
  <rect x="1" y="1" width="1198" height="538" rx="9" fill="none" stroke="#262930"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="52" y="54" font-size="28" fill="#F4F4F5">system architecture</text>
    <text x="1148" y="54" text-anchor="end" font-size="11" letter-spacing="1.5" fill="#777982">LOCAL INPUT → EVIDENCE</text>
    <path d="M52 78H1148" stroke="#262930"/>

    <g transform="translate(52 98)">
      <rect width="1096" height="66" rx="5" fill="#13151A" stroke="#262930"/>
      <rect width="14" height="66" rx="4" fill="url(#sa-green)"/>
      <text x="34" y="27" font-size="10" letter-spacing="1.4" fill="#31D5AE">CONTROL PLANE</text>
      <text x="34" y="48" font-size="14" fill="#F4F4F5">GitHub Actions</text>
      <path d="M266 14V52" stroke="#262930"/>
      <text x="294" y="28" font-size="13" fill="#F4F4F5">tests/</text>
      <text x="294" y="48" font-size="11" fill="#777982">pytest + compileall</text>
      <path d="M548 14V52" stroke="#262930"/>
      <text x="576" y="28" font-size="13" fill="#F4F4F5">deterministic checks</text>
      <text x="576" y="48" font-size="11" fill="#777982">calculation / alignment / failure modes</text>
    </g>

    <g transform="translate(52 194)">
      <g>
        <rect width="248" height="250" rx="5" fill="#13151A" stroke="#262930"/><rect width="248" height="16" rx="4" fill="url(#sa-blue)"/>
        <text x="18" y="50" font-size="10" letter-spacing="1.3" fill="#3A9BFF">01 / INPUTS</text>
        <text x="18" y="82" font-size="20" fill="#F4F4F5">local data</text>
        <path d="M18 102H230" stroke="#262930"/>
        <text x="18" y="130" font-size="13" fill="#F4F4F5">src/data/</text>
        <text x="18" y="160" font-size="12" fill="#A9A9B0">wide + long CSV</text>
        <text x="18" y="186" font-size="12" fill="#A9A9B0">benchmark + OHLCV</text>
        <text x="18" y="212" font-size="12" fill="#A9A9B0">synthetic fixtures</text>
      </g>
      <g transform="translate(272 0)">
        <rect width="248" height="250" rx="5" fill="#13151A" stroke="#262930"/><rect width="248" height="16" rx="4" fill="url(#sa-purple)"/>
        <text x="18" y="50" font-size="10" letter-spacing="1.3" fill="#936BFF">02 / TRANSFORM</text>
        <text x="18" y="82" font-size="20" fill="#F4F4F5">research panels</text>
        <path d="M18 102H230" stroke="#262930"/>
        <text x="18" y="130" font-size="13" fill="#F4F4F5">src/features/</text>
        <text x="18" y="160" font-size="12" fill="#A9A9B0">factors + operators</text>
        <text x="18" y="186" font-size="12" fill="#A9A9B0">diagnostics + splits</text>
        <text x="18" y="212" font-size="12" fill="#A9A9B0">src/strategies/</text>
      </g>
      <g transform="translate(544 0)">
        <rect width="248" height="250" rx="5" fill="#13151A" stroke="#262930"/><rect width="248" height="16" rx="4" fill="url(#sa-orange)"/>
        <text x="18" y="50" font-size="10" letter-spacing="1.3" fill="#FF9838">03 / ACCOUNT</text>
        <text x="18" y="82" font-size="20" fill="#F4F4F5">simulated state</text>
        <path d="M18 102H230" stroke="#262930"/>
        <text x="18" y="130" font-size="13" fill="#F4F4F5">src/backtest/</text>
        <text x="18" y="160" font-size="12" fill="#A9A9B0">drifted holdings</text>
        <text x="18" y="186" font-size="12" fill="#A9A9B0">signed trades + costs</text>
        <text x="18" y="212" font-size="12" fill="#A9A9B0">src/risk/</text>
      </g>
      <g transform="translate(816 0)">
        <rect width="248" height="250" rx="5" fill="#13151A" stroke="#262930"/><rect width="248" height="16" rx="4" fill="url(#sa-green)"/>
        <text x="18" y="50" font-size="10" letter-spacing="1.3" fill="#31D5AE">04 / EVIDENCE</text>
        <text x="18" y="82" font-size="20" fill="#F4F4F5">durable records</text>
        <path d="M18 102H230" stroke="#262930"/>
        <text x="18" y="130" font-size="13" fill="#F4F4F5">src/reporting/</text>
        <text x="18" y="160" font-size="12" fill="#A9A9B0">Markdown + JSON</text>
        <text x="18" y="186" font-size="12" fill="#A9A9B0">experiment registry</text>
        <text x="18" y="212" font-size="12" fill="#A9A9B0">reports/</text>
      </g>
      <path d="M248 125H266M262 121L266 125L262 129M520 125H538M534 121L538 125L534 129M792 125H810M806 121L810 125L806 129" fill="none" stroke="#777982"/>
    </g>

    <g transform="translate(52 470)">
      <path d="M0 0H1096" stroke="#262930"/>
      <text y="29" font-size="11" fill="#777982">FLOW</text>
      <text x="80" y="29" font-size="11" fill="#F4F4F5">validate → transform → simulate → serialize</text>
      <text x="1096" y="29" text-anchor="end" font-size="11" fill="#777982">research/ orchestrates deterministic runs</text>
    </g>
  </g>
</svg>
