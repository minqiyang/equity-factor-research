<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="method-header-title method-header-desc">
  <title id="method-header-title">Research method</title>
  <desc id="method-header-desc">A dithered title board introducing the four research contract layers: data, timing, accounting, and evidence.</desc>
  <defs>
    <pattern id="mh-blue" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#153A62"/><rect width="3" height="3" fill="#3A9BFF"/><rect x="4" y="4" width="2" height="2" fill="#3A9BFF"/></pattern>
    <pattern id="mh-purple" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#30205B"/><rect width="3" height="3" fill="#936BFF"/><rect x="4" y="4" width="2" height="2" fill="#936BFF"/></pattern>
    <pattern id="mh-green" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#0D4338"/><rect width="3" height="3" fill="#31D5AE"/><rect x="4" y="4" width="2" height="2" fill="#31D5AE"/></pattern>
    <pattern id="mh-orange" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="#572F12"/><rect width="3" height="3" fill="#FF9838"/><rect x="4" y="4" width="2" height="2" fill="#FF9838"/></pattern>
  </defs>
  <rect width="1200" height="280" rx="10" fill="#0A0B0D"/>
  <rect x="1" y="1" width="1198" height="278" rx="9" fill="none" stroke="#262930"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <g transform="translate(54 48)">
      <text font-size="14" letter-spacing="2" fill="#31D5AE">METHOD / 01</text>
      <text y="66" font-size="48" letter-spacing="-2" fill="#F4F4F5">research-method</text>
      <text y="112" font-size="17" fill="#A9A9B0">contracts before conclusions</text>
      <text y="166" font-size="12" fill="#777982">LOCAL-FIRST / DETERMINISTIC / AUDITABLE</text>
    </g>
    <g transform="translate(646 48)">
      <text font-size="12" letter-spacing="1.6" fill="#777982">CONTRACT LAYERS</text>
      <path d="M0 28H500" stroke="#262930"/>
      <g transform="translate(0 54)" font-size="12">
        <rect width="112" height="94" rx="4" fill="#13151A" stroke="#262930"/><rect width="112" height="16" rx="4" fill="url(#mh-blue)"/>
        <text x="14" y="48" fill="#F4F4F5">DATA</text><text x="14" y="72" font-size="10" fill="#777982">validate</text>
        <rect x="128" width="112" height="94" rx="4" fill="#13151A" stroke="#262930"/><rect x="128" width="112" height="16" rx="4" fill="url(#mh-purple)"/>
        <text x="142" y="48" fill="#F4F4F5">TIMING</text><text x="142" y="72" font-size="10" fill="#777982">align</text>
        <rect x="256" width="112" height="94" rx="4" fill="#13151A" stroke="#262930"/><rect x="256" width="112" height="16" rx="4" fill="url(#mh-orange)"/>
        <text x="270" y="48" fill="#F4F4F5">ACCOUNT</text><text x="270" y="72" font-size="10" fill="#777982">simulate</text>
        <rect x="384" width="116" height="94" rx="4" fill="#13151A" stroke="#262930"/><rect x="384" width="116" height="16" rx="4" fill="url(#mh-green)"/>
        <text x="398" y="48" fill="#F4F4F5">EVIDENCE</text><text x="398" y="72" font-size="10" fill="#777982">retain</text>
      </g>
      <path d="M0 184H500" stroke="#262930"/>
      <text y="210" font-size="11" fill="#A9A9B0">question → run → record → review</text>
    </g>
  </g>
</svg>
