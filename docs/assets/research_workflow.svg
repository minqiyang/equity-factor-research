<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">Equity factor research pipeline</title>
  <desc id="desc">A solid-color research pipeline from validated local inputs through features, diagnostics, portfolio simulation, and auditable evidence, with timing and interpretation gates.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="480" rx="24" fill="#f8fafc"/>
  <text x="64" y="66" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#0f172a">Research pipeline</text>
  <text x="64" y="94" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#64748b">Deterministic contracts from local inputs to auditable evidence</text>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <g transform="translate(64 140)">
      <rect width="190" height="112" rx="14" fill="#0f172a"/>
      <text x="20" y="32" font-size="12" font-weight="700" letter-spacing="1.2" fill="#93c5fd">INPUT</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#ffffff">Validated panels</text>
      <text x="20" y="86" font-size="13" fill="#cbd5e1">Local CSV or synthetic</text>
    </g>
    <g transform="translate(346 140)">
      <rect width="190" height="112" rx="14" fill="#1d4ed8"/>
      <text x="20" y="32" font-size="12" font-weight="700" letter-spacing="1.2" fill="#bfdbfe">RESEARCH</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#ffffff">Features</text>
      <text x="20" y="86" font-size="13" fill="#dbeafe">Point-in-time operators</text>
    </g>
    <g transform="translate(628 140)">
      <rect width="190" height="112" rx="14" fill="#0f766e"/>
      <text x="20" y="32" font-size="12" font-weight="700" letter-spacing="1.2" fill="#99f6e4">EVALUATE</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#ffffff">Diagnostics</text>
      <text x="20" y="86" font-size="13" fill="#ccfbf1">IC, splits, coverage</text>
    </g>
    <g transform="translate(910 140)">
      <rect width="226" height="112" rx="14" fill="#7c3aed"/>
      <text x="20" y="32" font-size="12" font-weight="700" letter-spacing="1.2" fill="#ddd6fe">SIMULATE</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#ffffff">Portfolio path</text>
      <text x="20" y="86" font-size="13" fill="#ede9fe">Drift, trades, costs</text>
    </g>

    <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
      <path d="M270 196H326"/>
      <path d="M552 196H608"/>
      <path d="M834 196H890"/>
    </g>

    <path d="M64 316H1136" stroke="#cbd5e1" stroke-width="1"/>
    <text x="64" y="352" font-size="12" font-weight="700" letter-spacing="1.2" fill="#64748b">CONTROL PLANE</text>

    <g transform="translate(64 374)">
      <rect width="246" height="62" rx="12" fill="#e2e8f0"/>
      <circle cx="28" cy="31" r="9" fill="#2563eb"/>
      <text x="48" y="27" font-size="14" font-weight="700" fill="#0f172a">Timing gate</text>
      <text x="48" y="45" font-size="12" fill="#475569">Lag and alignment</text>
    </g>
    <g transform="translate(334 374)">
      <rect width="246" height="62" rx="12" fill="#e2e8f0"/>
      <circle cx="28" cy="31" r="9" fill="#0f766e"/>
      <text x="48" y="27" font-size="14" font-weight="700" fill="#0f172a">Data gate</text>
      <text x="48" y="45" font-size="12" fill="#475569">Schema and missingness</text>
    </g>
    <g transform="translate(604 374)">
      <rect width="246" height="62" rx="12" fill="#e2e8f0"/>
      <circle cx="28" cy="31" r="9" fill="#7c3aed"/>
      <text x="48" y="27" font-size="14" font-weight="700" fill="#0f172a">Audit gate</text>
      <text x="48" y="45" font-size="12" fill="#475569">Metadata and tests</text>
    </g>
    <g transform="translate(874 374)">
      <rect width="262" height="62" rx="12" fill="#fee2e2"/>
      <circle cx="28" cy="31" r="9" fill="#b91c1c"/>
      <text x="48" y="27" font-size="14" font-weight="700" fill="#7f1d1d">Interpretation gate</text>
      <text x="48" y="45" font-size="12" fill="#991b1b">No trading or profit claim</text>
    </g>
  </g>
</svg>
